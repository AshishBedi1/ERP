<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var s = localStorage.getItem('erp-theme');
          var dark =
            s === 'dark' || (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/erp-logo-light.png" />
    <link rel="apple-touch-icon" href="/erp-logo-light.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ERP - Employee & Employer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
